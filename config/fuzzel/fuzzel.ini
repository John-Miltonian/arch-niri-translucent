; ═══════════════════════════════════════════════════════════════════════════════
;   FUZZEL CONFIGURATION
;   Application Launcher - Dark Mode
; ═══════════════════════════════════════════════════════════════════════════════

[main]
font=JetBrains Mono Nerd Font:size=11
icons-enabled=yes
icon-theme=Papirus-Dark
anchor=center
lines=15
width=40
tabs=yes
match-mode=fuzzy
prompt=✝ 
placeholder=Search...
show-actions=yes
drun-launch=true

[colors]
background=0a0a0aff
text=d4c4a8ff
match=d4c4a8ff
selection=4a1942ff
selection-text=d4c4a8ff
selection-match=d4c4a8ff
counter=b8860bff
border=8b0000ff

[border]
width=2
radius=8

[dmenu]
mode=text
prompt=:

[key-bindings]
prev=Mod1+k,Up,Shift+Tab
next=Mod1+j,Down,Tab
prev-with-wrap=none
next-with-wrap=none
first=Home,Control+Home
last=End,Control+End
execute=Return
execute-or-next=none
execute-input=Shift+Return
execute-or-next-input=Mod1+Return
cancel=Escape,Control+g,Control+bracketleft
