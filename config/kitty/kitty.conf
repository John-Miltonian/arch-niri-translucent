# ═══════════════════════════════════════════════════════════════════════════════
#   KITTY CONFIGURATION
#   Dark Mode + Transparency
# ═══════════════════════════════════════════════════════════════════════════════

# ───────────────────────────────────────────────────────────────────────────────
#   FONTS
# ───────────────────────────────────────────────────────────────────────────────
font_family JetBrains Mono Nerd Font
bold_font JetBrains Mono Nerd Font Bold
italic_font JetBrains Mono Nerd Font Italic
bold_italic_font JetBrains Mono Nerd Font Bold Italic

font_size 11.0

# ───────────────────────────────────────────────────────────────────────────────
#   CURSOR
# ───────────────────────────────────────────────────────────────────────────────
cursor #b8860b
cursor_text_color #0a0a0a
cursor_shape beam
cursor_blink_interval 0.5

# ───────────────────────────────────────────────────────────────────────────────
#   SCROLLBACK
# ───────────────────────────────────────────────────────────────────────────────
scrollback_lines 10000
scrollback_pager less --chop-long-lines --RAW-CONTROL-CHARS +INPUT_LINE_NUMBER

# ───────────────────────────────────────────────────────────────────────────────
#   MOUSE
# ───────────────────────────────────────────────────────────────────────────────
mouse_hide_wait 3.0
url_color #0087bd
url_style curly

# ───────────────────────────────────────────────────────────────────────────────
#   PERFORMANCE
# ───────────────────────────────────────────────────────────────────────────────
repaint_delay 10
input_delay 3
sync_to_monitor yes

# ───────────────────────────────────────────────────────────────────────────────
#   WINDOW
# ───────────────────────────────────────────────────────────────────────────────
remember_window_size yes
initial_window_width 80c
initial_window_height 24c
window_padding_width 4
draw_minimal_borders yes
window_margin_width 0

# ───────────────────────────────────────────────────────────────────────────────
#   TAB BAR
# ───────────────────────────────────────────────────────────────────────────────
tab_bar_edge bottom
tab_bar_style powerline
tab_powerline_style angled
tab_title_template {title}{' :{}:'.format(num_windows) if num_windows > 1 else ''}
active_tab_font_style bold
inactive_tab_font_style normal

# ───────────────────────────────────────────────────────────────────────────────
#   COLORS - Dark Mode with Christian Aesthetic
# ───────────────────────────────────────────────────────────────────────────────

# Background - Deep black with transparency
background #0a0a0a
background_opacity 0.85

# Foreground - Aged parchment
foreground #d4c4a8

# Selection
selection_background #4a1942
selection_foreground #d4c4a8

# Cursor
cursor #b8860b

# Color palette
# Black
color0  #1a1512
color8  #3d3630

# Red (Cardinal)
color1  #8b0000
color9  #a52a2a

# Green (Olive)
color2  #4a7c59
color10 #6b8e6b

# Yellow/Gold (Byzantine)
color3  #b8860b
color11 #daa520

# Blue (Royal Purple)
color4  #4a1942
color12 #6a3d5c

# Magenta
color5  #8b4513
color13 #a0522d

# Cyan (Silver)
color6  #a8a8a8
color14 #c0c0c0

# White (Parchment)
color7  #d4c4a8
color15 #f5f5dc

# URL styles
url_color #daa520

# ───────────────────────────────────────────────────────────────────────────────
#   KEYBINDINGS
# ───────────────────────────────────────────────────────────────────────────────
map ctrl+shift+c copy_to_clipboard
map ctrl+shift+v paste_from_clipboard
map ctrl+shift+plus change_font_size all +2.0
map ctrl+shift+minus change_font_size all -2.0
map ctrl+shift+0 change_font_size all 0

# ───────────────────────────────────────────────────────────────────────────────
#   ADVANCED
# ───────────────────────────────────────────────────────────────────────────────
enable_audio_bell no
visual_bell_duration 0.0
bell_on_tab "🔔 "
command_on_bell none

# ───────────────────────────────────────────────────────────────────────────────
#   TERMINAL FEATURES
# ───────────────────────────────────────────────────────────────────────────────
term xterm-kitty
shell_integration enabled

# ───────────────────────────────────────────────────────────────────────────────
#   WAYLAND
# ───────────────────────────────────────────────────────────────────────────────
linux_display_server wayland
wayland_titlebar_color background
